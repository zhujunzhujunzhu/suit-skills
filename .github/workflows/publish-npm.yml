# 发布 npm 包
name: Publish npm Package

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump_type:
        description: '版本递增类型'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version
          npm run sync:version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json apps/*/package.json packages/*/package.json apps/desktop/tauri.conf.json apps/desktop/Cargo.toml
          git commit -m "chore: bump version to $(node -p \"require('./package.json').version\")"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (CLI + web)
        run: npm run build:all

      - name: Resolve package metadata
        id: package
        run: |
          package_name="$(node -p 'require("./package.json").name')"
          package_version="$(node -p 'require("./package.json").version')"
          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Check npm package version
        id: npm_version
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set +e
          published_version="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org 2>/dev/null)"
          status=$?
          set -e

          if [ "$status" -eq 0 ] && [ "$published_version" = "$PACKAGE_VERSION" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Version already published::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish --access public

      - name: Push version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.npm_version.outputs.published != 'true'
        run: git push
