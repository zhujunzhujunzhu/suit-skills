# Desktop bundles: Windows installers (NSIS setup + MSI) and macOS bundle.
name: Desktop

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact: desktop-windows-setup-msi
          - os: macos-latest
            label: macos
            artifact: desktop-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop
        if: matrix.label == 'windows'
        run: npm run build:all && npm run build:sidecar && npm run tauri:build -- --bundles msi,nsis

      - name: Build macOS desktop
        if: matrix.label == 'macos'
        run: npm run build:desktop

      - name: Verify Windows installers
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction Stop
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction Stop

      - name: Upload bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  sync-gitee-artifacts:
    name: Sync desktop artifacts to Gitee
    needs: tauri
    runs-on: ubuntu-22.04
    env:
      GITEE_ARTIFACT_BRANCH: desktop-artifacts
      GITEE_REPO: gitee.com/zhujun12/suit-skills-cli.git

    steps:
      # 下载构建产物
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: false

      # 自动同步到你的 Gitee 仓库
      - name: Push to Gitee
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo 'GITEE_TOKEN secret is required.'
            exit 1
          fi

          cd desktop-artifacts
          {
            echo '# Suit Skills Desktop Artifacts'
            echo
            echo "- Source ref: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Workflow run: ${GITHUB_RUN_ID}"
            echo "- Updated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > README.md

          find . -type f | sort > MANIFEST.txt

          git init
          git checkout -B "${GITEE_ARTIFACT_BRANCH}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "auto build"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@${GITEE_REPO}"
          git push --force gitee "${GITEE_ARTIFACT_BRANCH}"
