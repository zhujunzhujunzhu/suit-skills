# 对齐 Gitee 桌面制品：Linux / Windows / macOS 安装包（Tauri bundle）。
name: Desktop

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: bash scripts/ci/tauri-deps-ubuntu.sh

      - name: Install dependencies
        run: npm ci

      - name: Build desktop
        run: npm run build:desktop

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  sync-gitee-artifacts:
    name: Sync desktop artifacts to Gitee
    needs: tauri
    runs-on: ubuntu-22.04

    steps:
      # 下载构建产物
      - name: Download build artifact
        uses: actions/download-artifact@v4

      # 自动同步到你的 Gitee 仓库
      - name: Push to Gitee
        uses: yi-Xu-010072/Gitee-Push-Action@main
        with:
          gitee-repo: https://gitee.com/zhujun12/suit-skills-cli.git
          gitee-token: ${{ secrets.GITEE_TOKEN }}
          commit-message: auto build
