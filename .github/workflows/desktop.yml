# Desktop bundles: Windows installers (NSIS setup + MSI) and macOS bundle.
name: Desktop

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact: desktop-windows-setup-msi
          - os: macos-latest
            label: macos
            artifact: desktop-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop
        if: matrix.label == 'windows'
        run: npm run build:all && npm run build:sidecar && npm run tauri:build -- --bundles msi,nsis

      - name: Build macOS desktop
        if: matrix.label == 'macos'
        run: npm run build:desktop

      - name: Verify Windows installers
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction Stop
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction Stop

      - name: Upload bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  sync-gitee-artifacts:
    name: Sync desktop artifacts to Gitee
    needs: tauri
    runs-on: ubuntu-22.04

    steps:
      # 下载构建产物
      - name: Download build artifact
        uses: actions/download-artifact@v4

      # 自动同步到你的 Gitee 仓库
      - name: Push to Gitee
        uses: yi-Xu-010072/Gitee-Push-Action@main
        with:
          gitee-repo: https://gitee.com/zhujun12/suit-skills-cli.git
          gitee-token: ${{ secrets.GITEE_TOKEN }}
          commit-message: auto build
