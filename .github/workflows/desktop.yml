# Desktop bundles: Windows installers (NSIS setup + MSI) and macOS bundles.
name: Desktop

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact: desktop-windows-setup-msi
          - os: macos-15-intel
            label: macos-intel
            artifact: desktop-macos-intel-x64
          - os: macos-latest
            label: macos-arm64
            artifact: desktop-macos-apple-silicon-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop
        if: matrix.label == 'windows'
        run: npm run build:all && npm run build:sidecar && npm run tauri:build -- --bundles msi,nsis

      - name: Build macOS desktop
        if: startsWith(matrix.label, 'macos')
        run: npm run build:desktop

      - name: Verify Windows installers
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem apps/desktop/target/release/bundle/msi/*.msi -ErrorAction Stop
          Get-ChildItem apps/desktop/target/release/bundle/nsis/*.exe -ErrorAction Stop

      - name: Upload bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/target/release/bundle/
          if-no-files-found: error

  sync-gitee-artifacts:
    name: Sync desktop artifacts to Gitee
    needs: tauri
    runs-on: ubuntu-22.04
    env:
      GITHUB_ARTIFACT_BRANCH: desktop-artifacts
      GITEE_ARTIFACT_BRANCH: desktop-artifacts
      GITEE_REPO: gitee.com/zhujun12/suit-skills-cli.git

    steps:
      # 检出仓库以读取 package.json 中的版本号
      - uses: actions/checkout@v6
        with:
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      # 下载构建产物
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: false

      # 生成版本清单 latest.json，供客户端版本检测使用
      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const version = require('./package.json').version;
          const baseUrl = 'https://cdn.jsdelivr.net/gh/zhujunzhujunzhu/suit-skills@desktop-artifacts';
          const pubDate = new Date().toISOString();
          const refName = process.env.GITHUB_REF_NAME || '';
          const sha = (process.env.GITHUB_SHA || '').substring(0, 7);

          function findFile(dir, ext) {
            try {
              const files = fs.readdirSync(dir).filter(f => f.endsWith(ext));
              return files.length > 0 ? path.join(dir, files[0]) : null;
            } catch { return null; }
          }

          const platforms = {};

          const winMsi = findFile('desktop-artifacts/desktop-windows-setup-msi/msi', '.msi');
          if (winMsi) {
            const filename = path.basename(winMsi);
            platforms['windows-x86_64'] = {
              filename,
              url: `${baseUrl}/desktop-windows-setup-msi/msi/${encodeURIComponent(filename)}`
            };
          }

          const macArm = findFile('desktop-artifacts/desktop-macos-apple-silicon-arm64/dmg', '.dmg');
          if (macArm) {
            const filename = path.basename(macArm);
            platforms['darwin-aarch64'] = {
              filename,
              url: `${baseUrl}/desktop-macos-apple-silicon-arm64/dmg/${encodeURIComponent(filename)}`
            };
          }

          const macX64 = findFile('desktop-artifacts/desktop-macos-intel-x64/dmg', '.dmg');
          if (macX64) {
            const filename = path.basename(macX64);
            platforms['darwin-x86_64'] = {
              filename,
              url: `${baseUrl}/desktop-macos-intel-x64/dmg/${encodeURIComponent(filename)}`
            };
          }

          const data = {
            version,
            pub_date: pubDate,
            notes: `Source ref: ${refName}, Commit: ${sha}`,
            platforms
          };

          fs.writeFileSync('desktop-artifacts/latest.json', JSON.stringify(data, null, 2));
          console.log('Generated latest.json:\n' + JSON.stringify(data, null, 2));
          EOF

      # 自动同步到你的 Gitee 仓库
      - name: Push desktop artifacts to GitHub and Gitee
        shell: bash
        timeout-minutes: 180
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GIT_TERMINAL_PROMPT: '0'
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_TOKEN:-}" ]; then
            echo 'GITHUB_TOKEN is required.'
            exit 1
          fi

          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo 'GITEE_TOKEN secret is required.'
            exit 1
          fi

          cd desktop-artifacts
          {
            echo '# Suit Skills Desktop Artifacts'
            echo
            echo "- Source ref: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Workflow run: ${GITHUB_RUN_ID}"
            echo "- Updated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > README.md

          find . -type f | sort > MANIFEST.txt

          git config --global init.defaultBranch "${GITEE_ARTIFACT_BRANCH}"
          git init
          git checkout -B "${GITEE_ARTIFACT_BRANCH}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "auto build"
          git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@${GITEE_REPO}"

          echo 'Artifact files to push:'
          find . -maxdepth 4 -type f -print | sort
          du -sh .

          git \
            -c credential.interactive=false \
            push --force --progress --porcelain github "${GITHUB_ARTIFACT_BRANCH}"

          git \
            -c credential.interactive=false \
            -c http.lowSpeedLimit=1000 \
            -c http.lowSpeedTime=600 \
            push --force --progress --porcelain gitee "${GITEE_ARTIFACT_BRANCH}"
