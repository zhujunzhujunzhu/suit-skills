version: '1.0'
name: pr-pipeline
displayName: PRPipeline
stages:
  - stage:
    name: compile
    displayName: 编译与测试
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Node.js 构建
        nodeVersion: 20.11.1
        commands:
          - |
            set -e
            npm config set registry https://registry.npmmirror.com
            npm ci
            npm run typecheck
            npm test
            npm run build:all
triggers:
  pr:
    branches:
      include:
        - master
        - main
