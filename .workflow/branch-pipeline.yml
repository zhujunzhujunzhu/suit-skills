version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
stages:
  - stage:
    name: compile
    displayName: 编译与测试
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Node.js 构建
        # 与 Gitee「Nodejs 构建」插件可选版本一致即可，需 >=18（见 package.json engines）
        nodeVersion: 20.11.1
        commands:
          - |
            set -e
            npm config set registry https://registry.npmmirror.com
            npm ci
            npm run typecheck
            npm test
            npm run build:all
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_nodejs
triggers:
  push:
    branches:
      exclude:
        - master
        - main
      include:
        - .*
