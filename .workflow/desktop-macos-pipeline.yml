# macOS 安装包必须在 macOS 上构建。请在 Gitee「计算资源管理」中纳管已安装 Xcode/CLT、Node 20+ 的 Mac，
# 将 hostGroupID.ID 改为该主机组唯一标识，并开启「克隆代码」。
# 无 Mac 资源时请在流水线列表中停用本流水线。
version: '1.0'
name: desktop-macos-pipeline
displayName: DesktopMacOS
stages:
  - stage:
    name: desktop_macos
    displayName: 桌面端 macOS
    steps:
      - step: shell@agent
        name: build_desktop_macos
        displayName: Tauri macOS 构建（自建 Mac 主机）
        hostGroupID:
          ID: macos-desktop
        script:
          - bash scripts/ci/gitee-desktop-macos.sh
triggers:
  push:
    branches:
      include:
        - master
        - main
