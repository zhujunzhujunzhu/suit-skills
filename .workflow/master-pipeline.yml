version: '1.0'
name: master-pipeline
displayName: MasterPipeline
stages:
  - stage:
    name: compile
    displayName: 编译与测试
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Node.js 构建
        nodeVersion: 20.11.1
        commands:
          - |
            set -e
            npm config set registry https://registry.npmmirror.com
            npm ci
            npm run typecheck
            npm test
            npm run build:all
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_nodejs
  - stage:
    name: desktop_linux
    displayName: 桌面端 Linux
    steps:
      - step: build@nodejs
        name: build_desktop_linux
        displayName: Tauri Linux 构建
        nodeVersion: 20.11.1
        commands:
          - |
            set -e
            bash scripts/ci/gitee-desktop-linux.sh
        artifacts:
          - name: DESKTOP_LINUX_ARTIFACT
            path:
              - ./src-tauri/target/release/bundle
      - step: publish@general_artifacts
        name: publish_desktop_linux
        displayName: 上传 Linux 桌面安装包
        dependArtifact: DESKTOP_LINUX_ARTIFACT
        artifactName: desktop-linux
        dependsOn: build_desktop_linux
  - stage:
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
triggers:
  push:
    branches:
      include:
        - master
        - main
