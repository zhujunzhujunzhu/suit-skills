# Windows 安装包必须在 Windows 环境下链接/打包，Gitee 云端「Nodejs 构建」一般为 Linux。
# 请先在：管理 → 计算资源管理 → 主机组 中纳管一台已安装 Git、Node20+、VS Build Tools、WebView2 的 Windows 机器，
# 将下方 hostGroupID.ID 改为该主机组的「唯一标识」，并在 Gitee 界面为本任务开启「克隆代码」。
# 若暂无 Windows 主机，请在流水线列表中停用本流水线，避免构建失败。
version: '1.0'
name: desktop-windows-pipeline
displayName: DesktopWindows
stages:
  - stage:
    name: desktop_windows
    displayName: 桌面端 Windows
    steps:
      - step: shell@agent
        name: build_desktop_windows
        displayName: Tauri Windows 构建（自建 Windows 主机）
        hostGroupID:
          ID: windows-desktop
        script:
          - powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/ci/gitee-desktop-windows.ps1
triggers:
  push:
    branches:
      include:
        - master
        - main
